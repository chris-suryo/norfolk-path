name: visual-review

# Non-gating review aid (renders map/character preview images). Was firing on
# every push AND every PR — double-running on any PR branch, and running on
# every docs push — for images nobody looks at most of the time. Now: only on
# PRs that touch the map/render inputs, plus on-demand. No bare `push`.
on:
  pull_request:
    paths:
      - "scripts/island_map.gd"
      - "scripts/cove_map.gd"
      - "scripts/prop_table.gd"
      - "assets/generated/**"
      - "tools/preview_map.py"
      - "tools/capture_visual_review.py"
      - "tools/capture_character_review.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture-map:
    name: Capture map review images
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install review renderer dependency
        run: pip install "Pillow==10.4.0"

      - name: Render visual review snapshot
        run: python tools/capture_visual_review.py --output-dir artifacts/visual-review --label "${{ github.sha }}"

      - name: Upload visual review artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-review-${{ github.sha }}
          path: artifacts/visual-review/${{ github.sha }}
          if-no-files-found: error
          retention-days: 90
